<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>UnicornApps</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #070710;
        color: #c8cfe0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        text-align: center;
        padding: 24px;
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #fff;
        color: #070710;
        font-weight: 900;
        font-size: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .msg { font-size: 14px; color: #6b7280; }
    </style>
  </head>
  <body>
    <!--
      UnicornApps runs in Capacitor server.url mode: the live app is loaded from
      https://www.unicornapps.app. This file is only the local fallback shell
      shown if the device is offline. Keeping this directory minimal is what keeps
      the signed AAB small â€” do not copy build output (.next / out) in here.
    -->
    <div class="wrap">
      <div class="logo">U</div>
      <div class="msg">Connecting to UnicornApps&hellip;</div>
      <div class="msg">Check your internet connection.</div>
    </div>
  </body>
</html>
